<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment 5 - Interactive Quiz Application</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="page-shell">
        <section class="page-intro">
            <p class="eyebrow">Assignment 5</p>
            <h1>Interactive Quiz Application</h1>
            <p class="page-note">Questions are stored as objects, shown one at a time, and scored only after the final answer so the flow stays simple and focused.</p>
        </section>

        <section class="workspace">
            <section class="panel stack">
                <div class="header-row">
                    <p class="section-title">One question at a time</p>
                    <span id="progressBadge" class="status status-warn">Question 1 of 5</span>
                </div>

                <div id="quizStage" class="stack">
                    <h2 id="questionText" class="question-text"></h2>
                    <form id="quizForm" class="stack">
                        <div id="optionList" class="option-list"></div>
                        <div class="actions">
                            <button type="submit" id="nextButton">Save and next</button>
                            <button type="button" id="restartQuiz" class="secondary">Restart</button>
                        </div>
                    </form>
                    <p id="quizMessage" class="message">Select one answer to continue.</p>
                </div>

                <section id="resultPanel" class="stack" hidden>
                    <p class="section-title">Final score</p>
                    <div class="metric-grid">
                        <article class="metric">
                            <span>Correct</span>
                            <strong id="correctAnswers">0</strong>
                        </article>
                        <article class="metric">
                            <span>Total questions</span>
                            <strong id="totalQuestions">0</strong>
                        </article>
                        <article class="metric">
                            <span>Score</span>
                            <strong id="scoreSummary">0%</strong>
                        </article>
                    </div>
                    <ul id="reviewList" class="review-list"></ul>
                </section>
            </section>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
